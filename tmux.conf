# Terminal
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Fix Option+Enter and other key combos in iTerm2
set-window-option -g xterm-keys on

# Mouse support
set -g mouse on

# Clipboard — OSC 52 passthrough to iTerm2/macOS
set -g set-clipboard on

# Copy mode: use vi keys
setw -g mode-keys vi

# Mouse drag ends → copy-selection (tmux emits OSC 52 back through SSH to iTerm2)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# 'y' in copy mode → copy-selection (same OSC 52 path)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Don't rename windows automatically
set-option -g allow-rename off

# Increase scrollback buffer
set -g history-limit 10000

# Faster key repetition
set -s escape-time 0

# Prefix: Ctrl+a (more ergonomic than Ctrl+b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux config reloaded!"

# Intuitive splits that keep current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# mang-teacher: log tmux events for mastery tracking
set-hook -g window-linked "run-shell 'bun run ~/.claude/skills/mang-teacher/Tools/log.ts --user mike --event \"tmux window-created\" &>/dev/null'"
set-hook -g session-created "run-shell 'bun run ~/.claude/skills/mang-teacher/Tools/log.ts --user mike --event \"tmux session-created\" &>/dev/null'"
